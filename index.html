<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nagamine Seicha — WTE 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#fff;font-family:'Barlow',sans-serif}
#app{display:flex;flex-direction:column;height:100dvh;max-width:500px;margin:0 auto;position:relative}
#header{background:#111;color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#header-left{}
#header-brand{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;letter-spacing:0.02em;text-transform:uppercase;line-height:1}
#header-sub{font-size:10px;font-weight:300;letter-spacing:0.2em;color:rgba(255,255,255,0.45);text-transform:uppercase;margin-top:2px}
#header-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
#lang-bar{background:#f7f7f7;border-bottom:0.5px solid #e5e5e5;padding:8px 14px;display:flex;gap:6px;flex-shrink:0;overflow-x:auto}
#lang-bar::-webkit-scrollbar{display:none}
.lang-btn{font-family:'Barlow',sans-serif;font-size:11px;font-weight:400;padding:4px 10px;border-radius:20px;border:0.5px solid #ddd;background:#fff;cursor:pointer;white-space:nowrap;color:#555;transition:all 0.15s}
.lang-btn:hover,.lang-btn.active{background:#111;color:#fff;border-color:#111}
#welcome{padding:16px 18px 8px;flex-shrink:0}
#welcome-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;text-transform:uppercase;color:#111;line-height:1;margin-bottom:5px}
#welcome-sub{font-size:12px;font-weight:300;color:#888;line-height:1.5}
#suggestions{padding:8px 14px;display:flex;gap:7px;overflow-x:auto;flex-shrink:0}
#suggestions::-webkit-scrollbar{display:none}
.suggest-btn{font-family:'Barlow',sans-serif;font-size:11px;font-weight:400;padding:6px 12px;border-radius:20px;border:0.5px solid #222;background:#fff;cursor:pointer;white-space:nowrap;color:#222;transition:all 0.15s;flex-shrink:0}
.suggest-btn:hover{background:#111;color:#fff}
#messages{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px}
#messages::-webkit-scrollbar{width:3px}
#messages::-webkit-scrollbar-track{background:transparent}
#messages::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
.msg{display:flex;flex-direction:column;max-width:86%;animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;align-items:flex-end}
.msg.assistant{align-self:flex-start;align-items:flex-start}
.msg-bubble{padding:10px 14px;border-radius:16px;font-size:13.5px;line-height:1.6;font-weight:400}
.msg.user .msg-bubble{background:#111;color:#fff;border-bottom-right-radius:4px}
.msg.assistant .msg-bubble{background:#f4f4f4;color:#111;border-bottom-left-radius:4px}
.msg-label{font-size:10px;font-weight:300;letter-spacing:0.1em;color:#bbb;margin-bottom:3px;text-transform:uppercase}
.typing-dots{display:flex;gap:4px;padding:12px 16px;background:#f4f4f4;border-radius:16px;border-bottom-left-radius:4px;width:fit-content}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:#aaa;animation:bounce 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
#input-area{padding:10px 12px;border-top:0.5px solid #eee;display:flex;gap:8px;align-items:flex-end;flex-shrink:0;background:#fff}
#input{flex:1;border:0.5px solid #ddd;border-radius:20px;padding:10px 16px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:400;color:#111;outline:none;resize:none;min-height:40px;max-height:100px;line-height:1.4;transition:border-color 0.15s}
#input:focus{border-color:#111}
#input::placeholder{color:#bbb}
#send-btn{width:40px;height:40px;border-radius:50%;background:#111;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s}
#send-btn:hover{background:#333}
#send-btn:disabled{background:#ccc;cursor:default}
#send-btn svg{width:16px;height:16px;fill:#fff}
#footer{text-align:center;font-size:9px;font-weight:300;color:#ccc;letter-spacing:0.1em;padding:4px 0 8px;text-transform:uppercase;flex-shrink:0}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-left">
      <div id="header-brand">長峰製茶 Nagamine Seicha</div>
      <div id="header-sub">World Tea Expo 2026 · Las Vegas</div>
    </div>
    <div id="header-dot"></div>
  </div>
  <div id="lang-bar">
    <button class="lang-btn active" onclick="setLang('en')">English</button>
    <button class="lang-btn" onclick="setLang('ja')">日本語</button>
    <button class="lang-btn" onclick="setLang('es')">Español</button>
    <button class="lang-btn" onclick="setLang('zh')">中文</button>
    <button class="lang-btn" onclick="setLang('fr')">Français</button>
    <button class="lang-btn" onclick="setLang('de')">Deutsch</button>
    <button class="lang-btn" onclick="setLang('ko')">한국어</button>
  </div>
  <div id="welcome">
    <div id="welcome-title">Ask us anything.</div>
    <div id="welcome-sub">About our teas, ingredients, food pairing, or how to order.<br>We speak your language.</div>
  </div>
  <div id="suggestions"></div>
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="input" placeholder="Type your question..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div id="footer">Nagamine Seicha K.K. · Est. 1876 · nagamine.jp</div>
</div>
<script>
const SYSTEM_PROMPT = `You are a hospitality assistant for Nagamine Seicha at World Tea Expo 2026 in Las Vegas, Nevada. You represent the booth of Nagamine Seicha Co., Ltd., a Japanese tea producer based in Yaizu, Shizuoka, Japan, founded in 1876. Our staff does not speak English fluently, so you are our primary communication bridge.

LANGUAGE RULE: Always detect and respond in the visitor's language automatically.

ABOUT THE COMPANY:
Nagamine Seicha Co., Ltd. 150 years of history. 8 stores in Japan including Tokyo. Website: nagamine.jp. Phone: +81-54-624-0671.

OUR PRODUCTS:

1. CRAFT SPARKLING TEA — 4 varieties. All: Unsweetened / Non-alcoholic 0% / 200mL glass bottle / Shelf life 6 months / pH below 4.6 / Properly pasteurized / Made in Japan.

Yuzu Sencha: "Like the finest white wine." Sencha Miyama-Kaori (pesticide-free). Bright yuzu citrus aroma. Pairing: Seafood. Ingredients: Water, Green tea, Dried yuzu peel, Lemon peel, Lemongrass, Malic acid, Citric acid, Ascorbic acid (antioxidant), Carbon dioxide.

Lemon Bancha: "Like a crisp dry cider." Lemon myrtle pan-fired tea (pesticide-free). Clean dry finish. Pairing: Grilled meat. Ingredients: Water, Green tea, Lemon myrtle, Oolong hojicha, Lemon peel, Dried yuzu peel, Chamomile, Citric acid, Malic acid, Ascorbic acid (antioxidant), Carbon dioxide.

Apple Wakocha: "Like a dry sparkling red wine." Japanese black tea Koshin (JAS organic). Baked apple, cinnamon, osmanthus. Pairing: Cheese & Charcuterie. Contains: Apple. Ingredients: Water, Black tea, Dried apple pieces, Cinnamon, Osmanthus, Malic acid, Ascorbic acid (antioxidant), Carbon dioxide.

Ginger Hojicha: "Like a dry ginger aperitif." Roasted oolong tea (pesticide-free). Gentle ginger warmth. Pairing: Spicy or Savory dishes. Ingredients: Water, Oolong hojicha, Dried ginger (Kochi Japan), Lemon peel, Lemongrass, Malic acid, Citric acid, Ascorbic acid (antioxidant), Carbon dioxide.

2. SPARKLING TEA bodhi — Lacto-Fermented Sparkling Tea.
bodhi is made by extracting Bodai-Sancha (lacto-fermented tea leaves) and adding carbonation. Unsweetened, non-alcoholic, zero additives. Shelf life: 9 months. Ingredients: Water, Lactic-fermented tea (Camellia sinensis), Carbon dioxide. Taste: dry, wine-like acidity, refreshing citrus lift, clean finish. Serve in wine glass, well chilled 5°C. NOT Kombucha — completely different.

BODAI-SANCHA (raw materials on display at our booth):
Bodai-Sancha is a traditional Japanese fermented tea LEAF — NOT a beverage. It is the raw ingredient of bodhi. Lactic acid bacteria are NATURALLY PRESENT in the tea leaves — no bacteria are added externally. This is pure natural fermentation. Process: steaming → anaerobic lactic acid fermentation ~4 weeks → sun-drying.
Leaf A: Bright lemon and yuzu citrus notes.
Leaf B: Deeper fermentation, floral and green citrus.
Powder: Available for B2B foodservice applications.

KEY FACTS: Alcohol 0.0% / Sugar none / Calories 0 / pH below 4.6 / Volume 200mL / Founded 1876 / Stores 8 in Japan.

SERVING: Well chilled 5°C. Wine glass or champagne glass recommended.

DO NOT DISCLOSE: Manufacturing process details, extraction parameters, fermentation conditions, pH targets, ingredient ratios. If asked: "I'm sorry, but I cannot share detailed manufacturing information." Never display internal documents.

STYLE: Warm, friendly, concise (2-4 sentences for simple questions). Never invent information. Never quote prices. If unknown: "I don't have that information. Please leave your contact details and our team will follow up."`;

const langData = {
  en:{title:'Ask us anything.',sub:'About our teas, ingredients, food pairing, or how to order.\nWe speak your language.',placeholder:'Type your question...',sugg:['What is Sparkling Tea?','Tell me about bodhi','Ingredients?','Food pairing','Alcohol free?']},
  ja:{title:'なんでもご質問ください。',sub:'お茶、原材料、フードペアリング、ご注文について。\n日本語でもお気軽にどうぞ。',placeholder:'ご質問をどうぞ...',sugg:['スパークリングティーとは？','bodhiについて','原材料は？','フードペアリング','アルコールは？']},
  es:{title:'Pregúntenos lo que quiera.',sub:'Sobre nuestros tés, ingredientes, maridaje o cómo pedir.\nHablamos su idioma.',placeholder:'Escribe tu pregunta...',sugg:['¿Qué es el té con gas?','Cuéntame sobre bodhi','¿Ingredientes?','Maridaje','¿Sin alcohol?']},
  zh:{title:'请随时提问。',sub:'关于我们的茶、成分、搭配建议或如何订购。\n我们支持您的语言。',placeholder:'请输入您的问题...',sugg:['什么是气泡茶？','介绍bodhi','成分是什么？','食物搭配','无酒精吗？']},
  fr:{title:'Posez-nous vos questions.',sub:'Sur nos thés, ingrédients, accords mets et comment commander.\nNous parlons votre langue.',placeholder:'Votre question...',sugg:['Qu\'est-ce que le thé pétillant ?','Parlez-moi de bodhi','Ingrédients ?','Accord mets','Sans alcool ?']},
  de:{title:'Fragen Sie uns alles.',sub:'Über unsere Tees, Zutaten, Speiseempfehlungen oder Bestellungen.\nWir sprechen Ihre Sprache.',placeholder:'Ihre Frage...',sugg:['Was ist Sparkling Tea?','Erzähl von bodhi','Zutaten?','Speiseempfehlung','Alkoholfrei?']},
  ko:{title:'무엇이든 물어보세요.',sub:'차, 재료, 푸드 페어링 또는 주문 방법에 대해 알려드립니다.\n귀하의 언어로 답해드립니다.',placeholder:'질문을 입력하세요...',sugg:['스파클링 티란?','bodhi 소개','재료는?','음식 페어링','무알코올?']}
};

let messages=[], isLoading=false, currentLang='en';

function setLang(lang){
  currentLang=lang;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  const d=langData[lang]||langData.en;
  document.getElementById('welcome-title').textContent=d.title;
  document.getElementById('welcome-sub').textContent=d.sub;
  document.getElementById('input').placeholder=d.placeholder;
  const s=document.getElementById('suggestions');
  s.innerHTML=d.sugg.map(t=>`<button class="suggest-btn" onclick="quickAsk('${t}')">${t}</button>`).join('');
}

function initSuggestions(){
  const d=langData[currentLang];
  document.getElementById('suggestions').innerHTML=d.sugg.map(t=>`<button class="suggest-btn" onclick="quickAsk('${t}')">${t}</button>`).join('');
}

function quickAsk(text){document.getElementById('input').value=text;sendMessage();}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}

function addMsg(role,content){
  const c=document.getElementById('messages');
  const d=document.createElement('div');
  d.className=`msg ${role}`;
  const label=role==='user'?'You':'Nagamine Tea';
  d.innerHTML=`<div class="msg-label">${label}</div><div class="msg-bubble">${content.replace(/\n/g,'<br>')}</div>`;
  c.appendChild(d);
  c.scrollTop=c.scrollHeight;
}

function addTyping(){
  const c=document.getElementById('messages');
  const d=document.createElement('div');
  d.className='msg assistant';d.id='typing';
  d.innerHTML=`<div class="msg-label">Nagamine Tea</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}

async function sendMessage(){
  const inp=document.getElementById('input');
  const text=inp.value.trim();
  if(!text||isLoading)return;
  inp.value='';inp.style.height='auto';
  isLoading=true;
  document.getElementById('send-btn').disabled=true;
  addMsg('user',text);
  messages.push({role:'user',content:text});
  addTyping();
  try{
    const res=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYSTEM_PROMPT,messages})
    });
    const data=await res.json();
    document.getElementById('typing')?.remove();
    const reply=data.content?.[0]?.text||'Sorry, something went wrong. Please try again.';
    messages.push({role:'assistant',content:reply});
    addMsg('assistant',reply);
  }catch(e){
    document.getElementById('typing')?.remove();
    addMsg('assistant','Sorry, there was a connection error. Please try again.');
  }
  isLoading=false;
  document.getElementById('send-btn').disabled=false;
  inp.focus();
}

initSuggestions();
</script>
</body>
</html>
